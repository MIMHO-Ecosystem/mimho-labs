[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.28"

# Otimizador e motor IR para resolver o "Stack too deep"
optimizer = true
optimizer_runs = 200
via_ir = true

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/"
]

test = "test"

# Ignorar testes econômicos por enquanto (quebram por duplicação de interfaces)
ignored_paths = ["test/econ/**"]
